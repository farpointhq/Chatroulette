<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      padding: 40px;
      margin: 0;
    }
    .scenario {
      margin-bottom: 60px;
    }
    .scenario-title {
      color: #888;
      font-size: 14px;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .component {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 16px;
      max-width: 420px;
      border: 1px solid #2a2a4e;
    }
    .feeds {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .feed {
      position: relative;
      flex: 1;
      height: 100px;
      background: #0a0a15;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .feed video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .feed-label {
      position: absolute;
      bottom: 4px;
      left: 4px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
    .feed-placeholder {
      color: #666;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    .feed-placeholder .icon {
      font-size: 28px;
      margin-bottom: 4px;
    }
    .feed-placeholder .text {
      font-size: 11px;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .status-bar.connecting {
      color: #f0ad4e;
      background: rgba(240,173,78,0.1);
    }
    .status-bar.connected {
      color: #5cb85c;
      background: rgba(92,184,92,0.1);
    }
    .status-bar.disconnected {
      color: #d9534f;
      background: rgba(217,83,79,0.1);
    }
    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .ctrl-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .ctrl-btn:hover {
      background: #444;
    }
    .ctrl-btn.muted {
      background: #d9534f;
    }
    .ctrl-btn.video-off {
      background: #d9534f;
    }
    .ctrl-btn.end {
      background: #c9302c;
    }
    .ctrl-btn.end:hover {
      background: #a52520;
    }
    .video-mock {
      background: linear-gradient(135deg, #1a1a3e, #2a1a4e);
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-mock .avatar {
      font-size: 36px;
    }
  </style>
</head>
<body>
  <div class="scenario">
    <div class="scenario-title">State 1: Connecting (waiting for opponent)</div>
    <div class="component">
      <div class="status-bar connecting">
        <span>●</span>
        <span>connecting…</span>
      </div>
      <div class="feeds">
        <div class="feed">
          <div class="video-mock"><span class="avatar">👤</span></div>
          <span class="feed-label">Alice</span>
        </div>
        <div class="feed">
          <div class="feed-placeholder">
            <div>
              <div class="icon">⏳</div>
              <div class="text">Waiting…</div>
            </div>
          </div>
          <span class="feed-label">Bob</span>
        </div>
      </div>
      <div class="controls">
        <button class="ctrl-btn">🔊 Mute</button>
        <button class="ctrl-btn">📹 Video</button>
        <button class="ctrl-btn end">📞 End</button>
      </div>
    </div>
  </div>

  <div class="scenario">
    <div class="scenario-title">State 2: Connected (both streams active)</div>
    <div class="component">
      <div class="status-bar connected">
        <span>●</span>
        <span>connected</span>
      </div>
      <div class="feeds">
        <div class="feed">
          <div class="video-mock"><span class="avatar">👤</span></div>
          <span class="feed-label">Alice</span>
        </div>
        <div class="feed">
          <div class="video-mock" style="background: linear-gradient(135deg, #1e1e3e, #3e1e2e);"><span class="avatar">👥</span></div>
          <span class="feed-label">Bob</span>
        </div>
      </div>
      <div class="controls">
        <button class="ctrl-btn">🔊 Mute</button>
        <button class="ctrl-btn">📹 Video</button>
        <button class="ctrl-btn end">📞 End</button>
      </div>
    </div>
  </div>

  <div class="scenario">
    <div class="scenario-title">State 3: Audio muted, video off</div>
    <div class="component">
      <div class="status-bar connected">
        <span>●</span>
        <span>connected</span>
      </div>
      <div class="feeds">
        <div class="feed">
          <div class="feed-placeholder">
            <div>
              <div class="icon">🚫</div>
              <div class="text">Camera off</div>
            </div>
          </div>
          <span class="feed-label">Alice 🔇</span>
        </div>
        <div class="feed">
          <div class="video-mock" style="background: linear-gradient(135deg, #1e1e3e, #3e1e2e);"><span class="avatar">👥</span></div>
          <span class="feed-label">Bob</span>
        </div>
      </div>
      <div class="controls">
        <button class="ctrl-btn muted">🔇 Unmute</button>
        <button class="ctrl-btn video-off">📵 Video On</button>
        <button class="ctrl-btn end">📞 End</button>
      </div>
    </div>
  </div>

  <div class="scenario">
    <div class="scenario-title">State 4: Disconnected</div>
    <div class="component">
      <div class="status-bar disconnected">
        <span>●</span>
        <span>disconnected</span>
      </div>
      <div class="feeds">
        <div class="feed">
          <div class="video-mock"><span class="avatar">👤</span></div>
          <span class="feed-label">Alice</span>
        </div>
        <div class="feed">
          <div class="feed-placeholder">
            <div>
              <div class="icon">❌</div>
              <div class="text">Disconnected</div>
            </div>
          </div>
          <span class="feed-label">Bob</span>
        </div>
      </div>
      <div class="controls">
        <button class="ctrl-btn">🔊 Mute</button>
        <button class="ctrl-btn">📹 Video</button>
        <button class="ctrl-btn end">📞 End</button>
      </div>
    </div>
  </div>
</body>
</html>
